<!DOCTYPE html>
<html>
<head>
    <title>HTML5 Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">🎮 HTML5 Games</div>

    <input
        type="text"
        id="search"
        placeholder="Search games..."
    >
</header>

<section class="hero">
    <h1>Play Free Games</h1>
    <p>Cards, Puzzle, Arcade and Strategy Games</p>
</section>

<section class="games-grid">

    <a class="game-card" href="#">
        <img src="https://picsum.photos/400/240?1">
        <h3>Solitaire</h3>
    </a>

    <a class="game-card" href="#">
        <img src="https://picsum.photos/400/240?2">
        <h3>Sudoku</h3>
    </a>

    <a class="game-card" href="#">
        <img src="https://picsum.photos/400/240?3">
        <h3>Mahjong</h3>
    </a>

    <a class="game-card" href="#">
        <img src="https://picsum.photos/400/240?4">
        <h3>Chess</h3>
    </a>

</section>

<script src="script.js"></script>

</body>
</html>
